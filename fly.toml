app = "frugal"
primary_region = "ord"

[build]

# FRUGAL_AUTH_TOKEN must be set via `fly secrets set FRUGAL_AUTH_TOKEN=...`
# before the first deploy. The binary refuses to start on a non-loopback bind
# unless either the token or FRUGAL_ALLOW_UNAUTH=1 is present.
[env]
  FRUGAL_ADDR = "0.0.0.0:8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
