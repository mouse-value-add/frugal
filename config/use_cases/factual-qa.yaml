# Recipe: "Fresh facts" (search + small hosted model). Today only the
# small-hosted-model step ships; the search step wires in Phase 1 PR 4.
# See `frugal-strategy-v5.md` §6 for the canonical component status.
id: factual-qa
description: >
  Short factual lookups, trivia, definitional questions, and one-turn
  Q&A. The model mostly recalls or does shallow reasoning over a small
  context. Expensive frontier models are wasted here — the recipe
  deliberately picks mini/nano tiers.

source: curated
as_of: "2026-05-18"
confidence: high

classifier:
  hints:
    - who
    - what
    - when
    - where
    - which
    - how many
    - capital of
    - president of
    - definition
    - trivia
    - fact

recipes:
  high:
    steps:
      - chat:
          model: gpt-4o-mini
          system: "Answer the user's factual question directly. Be concise."
          input: "{task}"
    reason: >
      Even at the "high" tier this use case doesn't need frontier models.
      4o-mini scores within a couple of points of GPT-4o on TriviaQA at a
      fraction of the cost.

  balanced:
    steps:
      - chat:
          model: gpt-4.1-nano
          system: "Answer the user's factual question directly. Be concise."
          input: "{task}"
    reason: >
      Nano is genuinely good on one-turn factual Q&A. Default for this use
      case.

  cost:
    steps:
      - chat:
          model: gemini-2.0-flash
          system: "Answer the user's factual question directly. One sentence."
          input: "{task}"
    reason: >
      Flash is the absolute floor — low per-token cost, adequate on factual
      recall.

workload: config/workloads/use-cases/factual-qa.yaml
