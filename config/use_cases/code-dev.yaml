# Recipe: "Code generation, refactors" (local code model → hosted fallback).
# Today only the hosted chat step routes live traffic; local-model fallback
# lands in Phase 3. See `frugal-strategy-v5.md` §6 for the canonical
# component status.
id: code-dev
description: >
  Code generation, debugging, code review, code explanation, and test
  authoring. Chat-heavy workload that benefits from targeted doc/Stack
  Overflow lookups via search but rarely needs reranking. The model's
  coding-benchmark score (Aider, HumanEval-plus) drives routing more
  than general reasoning.

source: curated
as_of: "2026-05-18"
confidence: medium

classifier:
  hints:
    - code
    - refactor
    - function
    - class
    - bug
    - debug
    - test
    - implement
    - write tests
    - typescript
    - python
    - golang

recipes:
  high:
    steps:
      - chat:
          model: gpt-4.1
          system: "You are an expert code-completion assistant. Prefer minimal, idiomatic edits."
          input: "{task}"
    reason: >
      GPT-4.1 leads Aider-polyglot and holds up on long-context code reading.
      Worth the premium on non-trivial refactors and debugging.

  balanced:
    steps:
      - chat:
          model: gpt-4.1-mini
          system: "You are an expert code-completion assistant. Prefer minimal, idiomatic edits."
          input: "{task}"
    reason: >
      4.1-mini is the pragmatic default for day-to-day coding — strong
      coding scores at mini-tier cost. Claude Sonnet 4 is comparable on
      quality but measurably pricier per token.

  cost:
    steps:
      - chat:
          model: gpt-4o-mini
          system: "Make small, focused code edits. Don't restructure unprompted."
          input: "{task}"
    reason: >
      Good enough for single-file edits, linting-style fixes, and formatting.
      Breaks down on multi-file reasoning; flag that to callers via the
      reason field above.

workload: config/workloads/use-cases/code-dev.yaml
