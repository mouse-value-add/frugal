# Recipe: "Structured extraction (text → JSON)". Smallest JSON-mode-reliable
# hosted model — no toolchain components needed beyond chat. See
# `frugal-strategy-v5.md` §6 for the canonical component status.
id: structured-extraction
description: >
  Free-text to JSON extraction, entity/field extraction, schema filling,
  and format conversion. No toolchain needed — the recipe deliberately
  stays chat-only at every tier. The routing value comes from picking
  the cheapest JSON-mode-capable model that reliably emits
  schema-conformant output.

source: curated
as_of: "2026-05-18"
confidence: high

classifier:
  hints:
    - extract
    - to json
    - as json
    - schema
    - entity
    - field
    - parse
    - structured

recipes:
  high:
    steps:
      - chat:
          model: gpt-4o-mini
          system: "Extract the requested fields and return strict JSON matching the schema."
          input: "{task}"
    reason: >
      Even at the "high" tier this use case doesn't benefit from frontier
      models — JSON-mode reliability saturates at mini-tier. 4o-mini is
      the pick for schemas with nested/discriminated unions where
      schema-conformant output matters more than tone.

  balanced:
    steps:
      - chat:
          model: gemini-2.5-flash
          system: "Extract the requested fields and return strict JSON matching the schema."
          input: "{task}"
    reason: >
      Gemini 2.5 Flash is reliable on JSON mode and a bit cheaper than
      4o-mini per token for the typical extraction request. Default choice
      for this use case.

  cost:
    steps:
      - chat:
          model: gemini-2.0-flash
          system: "Extract the requested fields and return JSON matching the schema."
          input: "{task}"
    reason: >
      The absolute floor. Accepts occasional schema drift for the lowest
      per-request cost; recommend retrying with `balanced` on
      validation-failure.

workload: config/workloads/use-cases/structured-extraction.yaml
