# Recipe: "Fresh facts" — time-sensitive factual questions where a
# pre-trained model's static knowledge isn't enough. Every tier calls
# frugal__search first, then feeds the results to a small chat model.
# See `frugal-strategy-v5.md` §6 for the canonical component status.
id: fresh-facts
description: >
  Time-sensitive factual questions: today's news, current prices, this
  week's sports scores, live weather, schedules. The cheap path is one
  search call + a small hosted model to synthesize the answer, instead
  of a frontier model whose training cutoff makes it guess.

source: curated
as_of: "2026-05-18"
confidence: high

classifier:
  hints:
    - today
    - current
    - now
    - latest
    - this week
    - this month
    - right now
    - price
    - news
    - weather
    - score
    - happening

recipes:
  high:
    steps:
      - tool: frugal__search
        with:
          query: "{task}"
          max_results: 10
          provider: tavily
      - chat:
          model: gpt-4o
          system: "Answer using the supplied search results. Cite by URL. If results disagree, say so."
          input: "{task}\n\nResults:\n{step1.results}"
    reason: >
      Tavily's broader recall + frontier synthesis when answer fidelity
      matters more than per-call cost. Use for questions where being
      half-right is worse than being slow.

  balanced:
    steps:
      - tool: frugal__search
        with:
          query: "{task}"
          max_results: 5
      - chat:
          model: gpt-4.1-nano
          system: "Answer using only the supplied search results. Cite by URL. Be concise."
          input: "{task}\n\nResults:\n{step1.results}"
    reason: >
      Auto-routed search (cheapest configured) + nano synthesis is ~95%
      accuracy at ~5% the cost of frontier for time-sensitive lookups.
      Default for the use case.

  cost:
    steps:
      - tool: frugal__search
        with:
          query: "{task}"
          max_results: 3
          provider: serper
      - chat:
          model: gemini-2.0-flash
          system: "One sentence using the search results. Cite by URL."
          input: "{task}\n\nResults:\n{step1.results}"
    reason: >
      Cheapest-per-call search (Serper) + Flash synthesis. Floor pricing
      at the cost of recall breadth. Acceptable for low-stakes lookups.

workload: config/workloads/use-cases/fresh-facts.yaml
