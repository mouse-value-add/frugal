# Routed search providers consumed by the frugal__search MCP tool.
# Each entry whose api_key_env is set in the operator's environment is
# registered at startup; the cheapest cost_per_call is the default route
# when the tool is called without an explicit `provider` argument.
#
# v1.0 ships only the search-tool layer. Chat-model routing and its
# pricing tables come back in Phase 2 with the frugal__chat MCP tool.
search_providers:
    # Free / local-first: a self-hosted SearXNG instance. CostPerCall is 0
    # so it sorts ahead of paid providers in the auto-router; the fallback
    # chain catches us automatically if the instance is down. Operators
    # set SEARXNG_URL to enable (https://docs.searxng.org/admin/installation.html).
    searxng:
        base_url_env: SEARXNG_URL
        cost_per_call: 0.0
    # Free / public: community-run indie-web search. No API key required;
    # the driver identifies itself via User-Agent per Marginalia etiquette.
    # Ties with SearXNG on cost (both 0) — config order decides which is
    # hit first when both are configured.
    marginalia:
        base_url: https://api.marginalia.nu
        cost_per_call: 0.0
    # Cheap paid fallback.
    serper:
        api_key_env: SERPER_API_KEY
        base_url: https://google.serper.dev
        cost_per_call: 0.001
    # Premium paid fallback — LLM-tuned snippets + recurring monthly
    # free quota (track via free-quota awareness when wired).
    youcom:
        api_key_env: YDC_API_KEY
        base_url: https://api.ydc-index.io
        cost_per_call: 0.005

# Extract providers consumed by the frugal__extract MCP tool. Same
# routing rules as search: cheapest configured wins; transient errors
# fall through; permanent (e.g. empty content → likely JS-rendered)
# stop the chain and surface to the agent.
extract_providers:
    # Free / local: pure-Go Readability port. Fetches the URL with the
    # operator's HTTP client and runs an in-process content-extraction
    # pass. Returns Permanent on empty content (JS-rendered pages),
    # which lets the router fall through to a paid driver.
    goreadability:
        cost_per_call: 0.0
    # Premium paid: handles JS-rendered pages, anti-bot defenses, and
    # PDF / binary content. Operators set FIRECRAWL_API_KEY to enable.
    firecrawl:
        api_key_env: FIRECRAWL_API_KEY
        base_url: https://api.firecrawl.dev
        cost_per_call: 0.001

# Browse providers consumed by the frugal__browse MCP tool. Use this
# tool when the page needs JS execution to populate content (when
# frugal__extract returns empty / "page likely requires JS").
browse_providers:
    # Hosted headless Chrome. Handles JS, anti-bot waits, custom wait-
    # for selectors. Operators set BROWSERLESS_TOKEN to enable. Local
    # Playwright is deferred (binary install friction).
    browserless:
        api_key_env: BROWSERLESS_TOKEN
        base_url: https://chrome.browserless.io
        cost_per_call: 0.002
